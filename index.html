<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitMatch</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f8f8f8;
color:#222;
}
header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
}
.hero{
padding:50px 20px;
text-align:center;
background:linear-gradient(to right,#ffdde1,#ee9ca7);
}
.hero h1{
font-size:40px;
margin-bottom:10px;
}
.hero p{
font-size:18px;
}
button{
padding:12px 25px;
border:none;
background:#111;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}
.section{
padding:40px 20px;
text-align:center;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}
.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
.card img{
width:100%;
border-radius:10px;
}
footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>
<body>

<header>FitMatch</header>

<section class="hero">
<h1>Find the Look You Love</h1>
<p>Match Pinterest outfits with real products in your budget.</p>
<button>Explore Styles</button>
</section>

<section class="section">
<h2>Trending Looks</h2>
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=400">
<h3>Date Night Fit</h3>
<p>Under ₹999</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=400">
<h3>Old Money Style</h3>
<p>Under ₹1499</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=400">
<h3>College Casual</h3>
<p>Under ₹799</p>
</div>

</div>
</section>

<footer>
© 2026 FitMatch | Your Dream Fit, Matched
</footer>

</body>
</html>
